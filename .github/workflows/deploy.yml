name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Chat API (Cloudflare)
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      api_url: ${{ steps.api-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure workers.dev subdomain
        continue-on-error: true
        run: |
          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/subdomain" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"subdomain":"nyrokume"}'

      - name: Deploy worker
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/chat-api
          command: deploy
          secrets: |
            GEMINI_API_KEY
            GROQ_API_KEY
            OPENROUTER_API_KEY
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Configure Telegram inquiry secrets
        continue-on-error: true
        working-directory: workers/chat-api
        run: |
          npm ci
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram inquiry skipped: set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in GitHub Secrets."
            exit 0
          fi
          printf '%s' "$TELEGRAM_BOT_TOKEN" | npx wrangler secret put TELEGRAM_BOT_TOKEN
          printf '%s' "$TELEGRAM_CHAT_ID" | npx wrangler secret put TELEGRAM_CHAT_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Resolve API URL
        id: api-url
        run: |
          URL="${{ secrets.CHAT_API_URL }}"
          if [ -z "$URL" ]; then
            URL="https://nyrokume-chat-api.nyrokume.workers.dev"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  build:
    name: GitHub Pages
    needs: deploy-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npm run build:pages
        env:
          NEXT_PUBLIC_SITE_URL: https://nyrokume.github.io/nyrokume.dev
          NEXT_PUBLIC_CHAT_API_URL: ${{ needs.deploy-api.outputs.api_url }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy-pages:
    name: Publish Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
